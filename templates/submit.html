<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>molsay.com</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="sticky-banner">
        <p>
            <a href="/profile">profile</a> &nbsp;|&nbsp;
            <a href="/logout">logout</a>
        </p>
    </div>

    <div class="page-container has-banner">
        <form id="submit-form" onsubmit="return handleSubmit(event)">
            <textarea id="post-body" placeholder="Share something only you would know..." rows="3" required minlength="20" maxlength="5000"></textarea>
            <div class="form-footer">
                <span id="char-count">0 / 5000</span>
                <button type="submit" id="submit-button">Share</button>
            </div>
        </form>

        <div id="result" class="result-container" style="display: none;">
            <div id="result-status"></div>
            <div id="result-scores"></div>
            <div id="result-reason"></div>
        </div>

        {% if can_see_feed %}
        <hr class="feed-separator" style="margin-top: 25px;">
        <div id="feed-list"></div>
        <div id="feed-loading" style="display: none; text-align: center; padding: 20px; font-size: 14px;">loading...</div>
        <div id="feed-empty" style="display: none; text-align: center; padding: 40px 20px;">
            <p style="font-size: 16px;">No insights yet. Be the first to share one.</p>
        </div>
        {% else %}
        <hr class="feed-separator" style="margin-top: 25px;">
        <div style="text-align: center; padding: 40px 20px;">
            <p>Submit an approved insight to unlock the feed.</p>
        </div>
        {% endif %}
    </div>

    <script>
        const textarea = document.getElementById('post-body');
        const charCount = document.getElementById('char-count');

        textarea.addEventListener('input', () => {
            charCount.textContent = textarea.value.length + ' / 5000';
        });

        function handleSubmit(e) {
            e.preventDefault();
            const body = textarea.value.trim();
            const button = document.getElementById('submit-button');
            const result = document.getElementById('result');

            if (body.length < 20) {
                showResult('rejected', null, null, 'Post must be at least 20 characters.');
                return false;
            }

            button.disabled = true;
            button.textContent = 'Evaluating...';
            result.style.display = 'none';

            fetch('/api/submit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({body: body})
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    showResult('error', null, null, data.error);
                } else {
                    showResult(data.status, data.uniqueness_score, data.human_score, data.rejection_reason);
                    if (data.status === 'approved') {
                        textarea.value = '';
                        charCount.textContent = '0 / 5000';
                        // Reload to show new post in feed
                        setTimeout(() => { window.location.reload(); }, 1200);
                    }
                }
                button.disabled = false;
                button.textContent = 'Share';
            })
            .catch(() => {
                showResult('error', null, null, 'Something went wrong.');
                button.disabled = false;
                button.textContent = 'Share';
            });

            return false;
        }

        function showResult(status, uniqueness, human, reason) {
            const result = document.getElementById('result');
            const statusEl = document.getElementById('result-status');
            const scoresEl = document.getElementById('result-scores');
            const reasonEl = document.getElementById('result-reason');

            result.style.display = 'block';

            if (status === 'approved') {
                statusEl.textContent = 'APPROVED — +1 credit earned';
                statusEl.className = 'result-approved';
            } else if (status === 'rejected') {
                statusEl.textContent = 'NOT APPROVED';
                statusEl.className = 'result-rejected';
            } else {
                statusEl.textContent = 'ERROR';
                statusEl.className = 'result-rejected';
            }

            if (uniqueness !== null && human !== null) {
                scoresEl.textContent = 'uniqueness: ' + uniqueness.toFixed(2) + ' | human: ' + human.toFixed(2);
            } else {
                scoresEl.textContent = '';
            }

            reasonEl.textContent = reason || '';
        }

        {% if can_see_feed %}
        // Feed loading
        let loading = false;
        let hasMore = true;
        let oldestId = null;

        function loadFeed(beforeId) {
            if (loading || !hasMore) return;
            loading = true;
            document.getElementById('feed-loading').style.display = 'block';

            let url = '/api/feed';
            if (beforeId) url += '?before_id=' + beforeId;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('feed-loading').textContent = data.error;
                        return;
                    }

                    const list = document.getElementById('feed-list');
                    const posts = data.posts || [];

                    if (posts.length === 0 && !oldestId) {
                        document.getElementById('feed-empty').style.display = 'block';
                    }

                    posts.forEach(post => {
                        const el = document.createElement('div');
                        el.className = 'feed-item';

                        const meta = document.createElement('div');
                        meta.className = 'feed-meta';
                        const date = new Date(post.created_at);
                        meta.textContent = post.author + ' \u2014 ' + date.toLocaleDateString();

                        const body = document.createElement('div');
                        body.className = 'feed-body';
                        body.textContent = post.body;

                        const sep = document.createElement('hr');
                        sep.className = 'feed-separator';

                        el.appendChild(meta);
                        el.appendChild(body);
                        list.appendChild(el);
                        list.appendChild(sep);

                        oldestId = post.id;
                    });

                    hasMore = data.has_more;
                    loading = false;
                    document.getElementById('feed-loading').style.display = 'none';
                })
                .catch(() => {
                    loading = false;
                    document.getElementById('feed-loading').style.display = 'none';
                });
        }

        loadFeed();

        window.addEventListener('scroll', () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
                loadFeed(oldestId);
            }
        });
        {% endif %}
    </script>
</body>
</html>
